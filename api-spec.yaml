openapi: "3.1.0"
info:
  title: PageForge API
  version: "1.0.0"
  description: |
    REST API for PageForge visual page builder.
    Component trees are embedded in Page payloads as JSONB — there are no
    separate component endpoints.

servers:
  - url: http://localhost:8080/api/v1
    description: Local development

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [system]
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: "1.0.0"

  /projects:
    get:
      summary: List all projects
      operationId: listProjects
      tags: [projects]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectSummary"
                  total:
                    type: integer

    post:
      summary: Create a new project
      operationId: createProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"

  /projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/projectId"

    get:
      summary: Get project with metadata (no pages)
      operationId: getProject
      tags: [projects]
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Update project metadata and theme
      operationId: updateProject
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      summary: Delete project and all pages
      operationId: deleteProject
      tags: [projects]
      responses:
        "204":
          description: Project deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/pages:
    parameters:
      - $ref: "#/components/parameters/projectId"

    get:
      summary: List pages in a project (metadata only)
      operationId: listPages
      tags: [pages]
      responses:
        "200":
          description: Page list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PageSummary"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      summary: Create a new page
      operationId: createPage
      tags: [pages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePageRequest"
      responses:
        "201":
          description: Page created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/pages/{pageId}:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/pageId"

    get:
      summary: Get page with full component tree
      operationId: getPage
      tags: [pages]
      responses:
        "200":
          description: Page with components
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      summary: Save page (full component tree replace)
      operationId: updatePage
      tags: [pages]
      description: |
        Replaces the entire page including its component tree.
        The frontend sends the full flat component array on every save.
        This is intentional — partial patches on JSONB trees add complexity
        without meaningful performance benefit at our scale.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePageRequest"
      responses:
        "200":
          description: Page saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      summary: Delete a page
      operationId: deletePage
      tags: [pages]
      responses:
        "204":
          description: Page deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/pages/{pageId}/duplicate:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/pageId"

    post:
      summary: Duplicate a page (deep copy with new IDs)
      operationId: duplicatePage
      tags: [pages]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name for the duplicate (defaults to "Copy of {original}")
      responses:
        "201":
          description: Page duplicated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Page"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/pages/{pageId}/export:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/pageId"

    get:
      summary: Export page as HTML+CSS or React+Tailwind
      operationId: exportPage
      tags: [export]
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [html, react]
      responses:
        "200":
          description: Exported code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/pages/{pageId}/export/zip:
    parameters:
      - $ref: "#/components/parameters/projectId"
      - $ref: "#/components/parameters/pageId"

    get:
      summary: Download exported page as ZIP
      operationId: exportPageZip
      tags: [export]
      parameters:
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [html, react]
      responses:
        "200":
          description: ZIP file download
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    pageId:
      name: pageId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    ComponentType:
      type: string
      enum:
        - text
        - image
        - button
        - container
        - input
        - card
        - nav
        - list
        - icon
        - divider
        - spacer
        - video
        - custom-html

    CSSProperties:
      type: object
      description: Subset of CSS properties as key-value pairs
      additionalProperties:
        type: string
      example:
        display: flex
        flexDirection: column
        padding: 16px

    ComponentStyles:
      type: object
      required: [base]
      properties:
        base:
          $ref: "#/components/schemas/CSSProperties"
        tablet:
          $ref: "#/components/schemas/CSSProperties"
        mobile:
          $ref: "#/components/schemas/CSSProperties"

    ComponentMeta:
      type: object
      required: [name, locked, visible]
      properties:
        name:
          type: string
        locked:
          type: boolean
          default: false
        visible:
          type: boolean
          default: true

    Component:
      type: object
      required: [id, type, children, props, styles, meta, order]
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: "#/components/schemas/ComponentType"
        parentId:
          type: string
          format: uuid
          nullable: true
        children:
          type: array
          items:
            type: string
            format: uuid
        props:
          type: object
          additionalProperties: true
          description: Content properties vary by component type
        styles:
          $ref: "#/components/schemas/ComponentStyles"
        meta:
          $ref: "#/components/schemas/ComponentMeta"
        order:
          type: integer

    Theme:
      type: object
      required: [colors, fonts, spacing]
      properties:
        colors:
          type: object
          additionalProperties:
            type: string
          example:
            primary: "#3B82F6"
            secondary: "#8B5CF6"
            accent: "#F59E0B"
            neutral-50: "#FAFAFA"
            neutral-900: "#171717"
        fonts:
          type: object
          required: [heading, body]
          properties:
            heading:
              type: string
              example: Inter
            body:
              type: string
              example: Inter
        spacing:
          type: number
          description: Base spacing unit in pixels
          example: 4

    ProjectSummary:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        pageCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Project:
      type: object
      required: [id, name, theme, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        theme:
          $ref: "#/components/schemas/Theme"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        theme:
          $ref: "#/components/schemas/Theme"

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        theme:
          $ref: "#/components/schemas/Theme"
        baseUpdatedAt:
          type: string
          format: date-time
          description: |
            Optional. When set, the update succeeds only if the project's updatedAt still matches (optimistic concurrency).
            Use the updatedAt value from the last GET response.

    PageSummary:
      type: object
      required: [id, projectId, name, slug, order]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        order:
          type: integer
        componentCount:
          type: integer

    Page:
      type: object
      required: [id, projectId, name, slug, components, order]
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        components:
          type: array
          items:
            $ref: "#/components/schemas/Component"
        order:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreatePageRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
          description: URL-safe slug (auto-generated from name if omitted)

    UpdatePageRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
        components:
          type: array
          items:
            $ref: "#/components/schemas/Component"
          maxItems: 2000
        order:
          type: integer
        baseUpdatedAt:
          type: string
          format: date-time
          description: |
            Optional. When set, the save succeeds only if the page's updatedAt still matches (optimistic concurrency).
            Use the updatedAt value from the last GET response.

    ExportResult:
      type: object
      required: [format, files]
      properties:
        format:
          type: string
          enum: [html, react]
        files:
          type: array
          items:
            type: object
            required: [path, content]
            properties:
              path:
                type: string
                description: Relative file path in the export
                example: index.html
              content:
                type: string
                description: File contents

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code
          example: not_found
        message:
          type: string
          description: Human-readable message
          example: Project not found

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: validation_error
            message: "name is required"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: not_found
            message: "Project not found"

    Conflict:
      description: Duplicate value or concurrent modification
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            code: conflict
            message: "a page with this slug already exists in this project"
