services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pageforge
      POSTGRES_PASSWORD: pageforge
      POSTGRES_DB: pageforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pageforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://pageforge:pageforge@postgres:5432/pageforge?sslmode=disable"
      - "up"

  go-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://pageforge:pageforge@postgres:5432/pageforge?sslmode=disable
      PORT: "8080"
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: info
    ports:
      - "8080:8080"

  nginx:
    image: nginx:alpine
    depends_on:
      - go-backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html

volumes:
  pgdata:
