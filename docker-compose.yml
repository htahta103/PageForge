services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pageforge
      POSTGRES_PASSWORD: pageforge
      POSTGRES_DB: pageforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pageforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://pageforge:pageforge@postgres:5432/pageforge?sslmode=disable"
      - "up"

  go-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://pageforge:pageforge@postgres:5432/pageforge?sslmode=disable
      PORT: "8080"
      CORS_ORIGIN: http://localhost
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      go-backend:
        condition: service_healthy
    ports:
      - "80:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1/ >/dev/null || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  pgdata:
